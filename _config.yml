title: Ninj4-Blog
description: "Personal Blog"
author:
  name: "Ninj4"
  email: "ninj41312@proton.me"
  url: "https://github.com/JereC4str0"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
paginate_path: /page/:num/

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

# Custom variables
owner : "Ninj4"
year : "2020"
